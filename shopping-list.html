<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1);
      width: 100%;
      max-width: 480px;
      padding: 32px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    .input-row input {
      flex: 1;
      padding: 10px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 8px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #4f86f7;
    }

    .input-row button {
      padding: 10px 18px;
      background: #4f86f7;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #3b6fd4;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .clear-done {
      background: none;
      border: none;
      color: #e53e3e;
      font-size: 0.85rem;
      cursor: pointer;
      text-decoration: underline;
    }

    .clear-done:hover {
      color: #c53030;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 8px;
      border-bottom: 1px solid #edf2f7;
      transition: background 0.15s;
      border-radius: 6px;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.done .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: #4f86f7;
      cursor: pointer;
      flex-shrink: 0;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      word-break: break-word;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 6px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .delete-btn:hover {
      color: #e53e3e;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 32px 0;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템 입력..." />
      <button onclick="addItem()">추가</button>
    </div>
    <div class="stats">
      <span id="statsText">총 0개</span>
      <button class="clear-done" onclick="clearDone()">완료 항목 삭제</button>
    </div>
    <ul id="list"></ul>
    <p class="empty" id="emptyMsg">아이템을 추가해 보세요!</p>
  </div>

  <script>
    let items = JSON.parse(localStorage.getItem('shoppingList') || '[]');

    function save() {
      localStorage.setItem('shoppingList', JSON.stringify(items));
    }

    function render() {
      const list = document.getElementById('list');
      const emptyMsg = document.getElementById('emptyMsg');
      const statsText = document.getElementById('statsText');

      list.innerHTML = '';

      if (items.length === 0) {
        emptyMsg.style.display = 'block';
        statsText.textContent = '총 0개';
        return;
      }

      emptyMsg.style.display = 'none';
      const doneCount = items.filter(i => i.done).length;
      statsText.textContent = `총 ${items.length}개 (완료 ${doneCount}개)`;

      items.forEach((item, idx) => {
        const li = document.createElement('li');
        if (item.done) li.classList.add('done');

        const checkbox = document.createElement('input');
        checkbox.type = 'checkbox';
        checkbox.checked = item.done;
        checkbox.addEventListener('change', () => toggle(idx));

        const span = document.createElement('span');
        span.className = 'item-text';
        span.textContent = item.text;

        const btn = document.createElement('button');
        btn.className = 'delete-btn';
        btn.textContent = '✕';
        btn.title = '삭제';
        btn.addEventListener('click', () => remove(idx));

        li.appendChild(checkbox);
        li.appendChild(span);
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    function addItem() {
      const input = document.getElementById('itemInput');
      const text = input.value.trim();
      if (!text) return;
      items.push({ text, done: false });
      input.value = '';
      save();
      render();
    }

    function toggle(idx) {
      items[idx].done = !items[idx].done;
      save();
      render();
    }

    function remove(idx) {
      items.splice(idx, 1);
      save();
      render();
    }

    function clearDone() {
      items = items.filter(i => !i.done);
      save();
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    render();
  </script>
</body>
</html>
